<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>금융 종합 웹서비스 프로그램</title>
    <!--계좌 확인, 거래 내역 확인 페이지-->
    <link rel="stylesheet" href="accountManagement.css">
</head>
<body>
<div class="container_main">
    <div class="sidebar">
        <h2>금융 종합 <br>웹서비스 프로그램</h2>
        <nav>
            <ul>
                <li class="sidebar_pages"><a href="#" onclick="loginAlert()">지출 캘린더</a></li>
                <li class="sidebar_pages"><a href="#" onclick="loginAlert()">최근 거래 내역</a></li>
                <li class="sidebar_pages"><a href="#" onclick="loginAlert()">자산 현황</a></li>
                <li class="sidebar_pages"><a href="#" onclick="loginAlert()">송금</a></li>
                <li class="sidebar_pages"><a href="#" onclick="loginAlert()">나의 포트폴리오</a></li>
            </ul>
        </nav>
        <iframe src="https://www.musinsa.com/main/" class="ppl">네이버</iframe>
    </div>
    <main class="main-content">
        <div class="header">
            <h2 class="welcome">Welcome to TB</h2>
            <div class="search_bar">
                <input type="text" class="search" placeholder="Search">
                <button type="button" class="search-btn">검색</button>
            </div>
            <div class="login_sign_up">
                <a href="login_page.html" type="button" class="login-btn">로그인</a>
                <a href="sign-up.html" type="button" class="sign-up-btn">회원가입</a>
            </div>
        </div>
        <div class="main_container">
            <div class="container_left">
                <div class="account-number-box">
                    <div class="account-number">
                        <div class="account-number-title">
                            <h4>보유 계좌</h4>
                        </div>
                        <ul>
                            <li> 
                                <a>은행이름, 계좌번호</a>
                                <button type="button" class="number-btn">송금</button>
                            </li>

                            <li> 
                                <a>은행이름, 계좌번호</a>
                                <button type="button" class="number-btn">송금</button>
                            </li>

                            <li> 
                                <a>은행이름, 계좌번호</a>
                                <button type="button" class="number-btn">송금</button>
                            </li>
                        </ul>
                    </div>
                    <div class="use-account-number">
                        <div class="use-account-number-title">
                            <h4>최근사용계좌</h4>
                        </div>
                        <ul>
                            <li> 
                                <a>은행이름, 계좌번호</a>
                                <button type="button" class="number-btn">송금</button>
                            </li>

                            <li> 
                                <a>은행이름, 계좌번호</a>
                                <button type="button" class="number-btn">송금</button>
                            </li>

                            <li> 
                                <a>은행이름, 계좌번호</a>
                                <button type="button" class="number-btn">송금</button>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="account-use-box">
                    <div class="account-use-title">
                       <h4>거래 내역 조회</h4>  
                       <button type="button" class="expand-btn">확대</button>
                    </div>

                    <div class="transaction-filters">
                        <div class="date-selection">
                            <select id="year">
                                <option>2024년</option>
                            </select>
                            <label for="year">년도</label>
                    
                            <select id="month">
                                <option>11월</option>
                            </select>
                            <label for="month">월</label>

                            <select id="day">
                                <option>1일</option>
                            </select>
                            <label for="day">일</label>
                          </div>

                        <div class="transaction-type">
                            <button type="button">입금</button>
                            <button type="button">출금</button>
                        </div>

                        <button type="button" class="search-btn">조회</button>
                    </div>
                    <div class="transaction-table">
                        <table>
                            <tr>
                                <th>은행</th>
                                <th>날짜</th>
                                <th>금액</th>
                                <th>거래대상</th>
                                <th>거래내용</th>
                            </tr>
                        </table>
                    </div>

                    <div class="account-use">
                            
                    </div>
                </div>
            </div>
            <div class="container_right">
                <div class="today-use-history">
                    <h4>금일 사용 내역</h4>
                    <hr>
                </div>
                <div class="today-use-history-list">
                    
                </div>
            </div>
    </main>

</div>
</body>
<script>
    function loginAlert() {
        alert("로그인 필요!");
    }
</script>
</html>

</body>
</html>
